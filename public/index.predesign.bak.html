<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J-Link Web Interface</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #121212;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1c1c1c;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 2px solid #2e2e2e;
      flex-shrink: 0;
    }

    .header-brand { display: flex; align-items: center; gap: 11px; text-decoration: none; }
    .brand-text { display: flex; flex-direction: column; line-height: 1; }
    .brand-name { font-size: 1.15rem; font-weight: 700; color: #e8e8e8; letter-spacing: 0.2px; }
    .brand-sub  { font-size: 0.62rem; color: #555; letter-spacing: 0.6px; margin-top: 3px; }

    .badge {
      font-size: 0.7rem; padding: 2px 8px; border-radius: 10px;
      background: #2a2a2a; color: #888;
    }
    .badge.connected    { background: #1a472a; color: #69db7c; }
    .badge.disconnected { background: #3a1a1a; color: #ff8787; }
    .badge.scanning     { background: #3d2a00; color: #ffd166; }

    main { display: flex; flex: 1; overflow: hidden; }

    /* ── LEFT PANEL ── */
    .panel-left {
      width: 290px; flex-shrink: 0;
      background: #1c1c1c; border-right: 1px solid #2e2e2e;
      display: flex; flex-direction: column; overflow-y: auto;
    }

    .section { padding: 14px 16px; border-bottom: 1px solid #2e2e2e; }

    .section h3 {
      font-size: 0.7rem; text-transform: uppercase;
      letter-spacing: 1px; color: #777; margin-bottom: 10px;
    }

    label {
      display: block; font-size: 0.75rem; color: #888;
      margin-bottom: 3px; margin-top: 8px;
    }

    input, select {
      width: 100%; background: #252525; border: 1px solid #3a3a3a;
      color: #e0e0e0; padding: 6px 8px; border-radius: 4px; font-size: 0.8rem;
    }
    input:focus, select:focus { outline: none; border-color: #666; }

    .btn {
      display: block; width: 100%; padding: 8px; margin-top: 8px;
      border: none; border-radius: 4px; cursor: pointer;
      font-size: 0.82rem; font-weight: 600; transition: opacity 0.15s;
    }
    .btn:hover   { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-danger  { background: #c0392b; color: #fff; }
    .btn-action  { background: #252525; color: #bbb; margin-top: 6px; }
    .btn-action:hover { background: #333; }
    /* ── Shazam-style SCAN button ── */
    .scan-section { display: flex; flex-direction: column; align-items: center; padding: 28px 16px 18px; }

    .scan-btn-wrap {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      width: 160px; height: 160px; margin-bottom: 14px;
    }

    .scan-ring {
      position: absolute; border-radius: 50%;
      border: 1.5px solid rgba(66, 165, 245, 0.45);
      width: 120px; height: 120px;
      animation: shazamPulse 2.4s ease-out infinite;
    }
    .scan-ring-2 { animation-delay: 0.8s; }
    .scan-ring-3 { animation-delay: 1.6s; }

    @keyframes shazamPulse {
      0%   { transform: scale(1);   opacity: 0.7; }
      100% { transform: scale(2.4); opacity: 0; }
    }

    .scan-rotating-ring {
      position: absolute; width: 128px; height: 128px; border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: #42a5f5;
      border-right-color: rgba(66,165,245,0.35);
      animation: shazamSpin 1.8s linear infinite;
    }
    @keyframes shazamSpin { to { transform: rotate(360deg); } }

    /* Idle state — animations off */
    .scan-btn-wrap.scan-idle .scan-ring,
    .scan-btn-wrap.scan-idle .scan-rotating-ring {
      animation: none;
      opacity: 0;
    }

    .btn-shazam {
      width: 110px; height: 110px; border-radius: 50%; border: none;
      background: radial-gradient(circle at 38% 30%, #90d8ff 0%, #2196f3 48%, #1350b8 100%);
      color: #fff; font-size: 0.9rem; font-weight: 900; letter-spacing: 4px;
      cursor: pointer; position: relative; z-index: 1;
      box-shadow: 0 0 32px rgba(33,150,243,0.5), 0 0 64px rgba(33,150,243,0.18);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-shazam:hover {
      transform: scale(1.07);
      box-shadow: 0 0 48px rgba(33,150,243,0.7), 0 0 90px rgba(33,150,243,0.25);
    }
    .btn-shazam:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-scan    { background: #2a2a2a; color: #aaa; margin-top: 6px; border: 1px solid #3a3a3a; }
    .btn-scan:hover { background: #353535; }
    .btn-success { background: #1a472a; color: #69db7c; }

    .quick-actions { display: flex; flex-direction: column; }

    /* collapsible section */
    .section-collapsible .section-toggle {
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none;
      margin-bottom: 0;
    }
    .section-collapsible .section-toggle:hover h3 { color: #aaa; }
    .section-collapsible .chevron {
      font-size: 0.6rem; color: #555; transition: transform 0.2s;
    }
    .section-collapsible.collapsed .chevron { transform: rotate(-90deg); }
    .section-collapsible .section-body {
      overflow: hidden;
      max-height: 600px;
      transition: max-height 0.25s ease, opacity 0.2s;
      opacity: 1;
    }
    .section-collapsible.collapsed .section-body {
      max-height: 0;
      opacity: 0;
      pointer-events: none;
    }

    .script-area {
      width: 100%; background: #1a1a1a; border: 1px solid #3a3a3a;
      color: #cccccc; padding: 8px; border-radius: 4px;
      font-family: 'Consolas', monospace; font-size: 0.78rem;
      resize: vertical; min-height: 110px;
    }

    .jlink-path-info {
      font-size: 0.7rem; color: #555; padding: 8px 16px; word-break: break-all;
    }

    /* ── RIGHT PANEL ── */
    .panel-right {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
      position: relative;
    }

    .terminal-toolbar {
      background: #1c1c1c; padding: 8px 14px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid #2e2e2e; flex-shrink: 0;
    }
    .terminal-toolbar span { font-size: 0.78rem; color: #888; flex: 1; }

    .btn-small {
      padding: 4px 12px; font-size: 0.75rem; border: none;
      border-radius: 3px; cursor: pointer; background: #2a2a2a; color: #999;
    }
    .btn-small:hover { background: #383838; }

    #terminal {
      flex: 1; background: #0d0d0d; color: #c8ffc8;
      font-family: 'Consolas', 'Courier New', monospace; font-size: 0.82rem;
      padding: 12px; overflow-y: auto; white-space: pre-wrap; word-break: break-all;
    }

    .text-info   { color: #7eb8f7; }
    .text-error  { color: #ff7675; }
    .text-stderr { color: #fdcb6e; }
    .text-exit   { color: #999; }

    .input-row { display: flex; border-top: 1px solid #2e2e2e; flex-shrink: 0; }

    #cmd-input {
      flex: 1; background: #0d0d0d; border: none; color: #c8ffc8;
      font-family: 'Consolas', monospace; font-size: 0.82rem;
      padding: 10px 14px; outline: none;
    }

    #cmd-send {
      background: #3b82f6; color: #fff; border: none;
      padding: 0 20px; cursor: pointer; font-weight: 700;
    }
    #cmd-send:hover   { background: #2563eb; }
    #cmd-send:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── SCAN RESULTS OVERLAY ── */
    #scan-overlay {
      display: none;
      position: absolute; inset: 0;
      background: rgba(5,5,5,0.97);
      z-index: 10; overflow-y: auto; padding: 24px;
    }
    #scan-overlay.visible { display: block; }

    .scan-header {
      display: flex; align-items: center; margin-bottom: 20px; gap: 12px;
    }
    .scan-header h2 { font-size: 1rem; color: #bbb; flex: 1; }

    .btn-close {
      background: #1c1c1c; border: 1px solid #3a3a3a; color: #888;
      padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem;
    }
    .btn-close:hover { color: #e0e0e0; border-color: #666; }

    /* Probe card */
    .probe-card {
      background: #1c1c1c; border: 1px solid #2e2e2e; border-radius: 8px;
      padding: 16px; margin-bottom: 16px;
    }
    .probe-title {
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px;
      color: #888; margin-bottom: 12px;
    }

    /* Device info card */
    .device-card {
      background: #161616; border: 1px solid #2e2e2e; border-radius: 10px;
      padding: 16px; margin-bottom: 16px;
    }
    .device-card.failed { border-color: #4a1a1a; opacity: 0.7; }

    /* ── Success card ── */
    .device-card.success {
      background: #071a10;
      border: 2px solid #2ecc71;
      box-shadow: 0 0 24px rgba(46,204,113,0.25), 0 0 6px rgba(46,204,113,0.15);
      animation: successPulse 0.6s ease-out;
    }
    @keyframes successPulse {
      0%   { transform: scale(0.97); opacity: 0; }
      60%  { transform: scale(1.01); }
      100% { transform: scale(1);    opacity: 1; }
    }

    .found-banner {
      display: flex; align-items: center; gap: 18px;
      background: linear-gradient(135deg, #071f10 0%, #0b3a1c 50%, #071f10 100%);
      border: 1px solid #2ecc71; border-radius: 10px;
      padding: 20px 22px; margin-bottom: 18px;
      box-shadow: inset 0 0 40px rgba(46,204,113,0.07);
    }
    .found-icon {
      font-size: 2.8rem; line-height: 1; flex-shrink: 0;
      filter: drop-shadow(0 0 10px rgba(46,204,113,0.9));
      animation: iconPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s both;
    }
    @keyframes iconPop {
      0%   { transform: scale(0) rotate(-20deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    .found-text { flex: 1; min-width: 0; }
    .found-text .found-label {
      font-size: 0.68rem; text-transform: uppercase; letter-spacing: 2px;
      color: #52c477; margin-bottom: 5px;
    }
    .found-text .found-board {
      font-size: 1.75rem; font-weight: 900; color: #fff; line-height: 1.1;
      letter-spacing: 0.5px;
      text-shadow: 0 0 24px rgba(46,204,113,0.55);
    }
    .found-text .found-part {
      font-family: 'Consolas', monospace;
      font-size: 1.05rem; font-weight: 700;
      color: #69db7c; letter-spacing: 1.5px; margin-top: 4px;
      text-shadow: 0 0 12px rgba(46,204,113,0.4);
    }
    .found-text .found-family {
      font-size: 0.78rem; color: #4caf77; margin-top: 6px; opacity: 0.85;
    }
    .found-iface {
      flex-shrink: 0; font-size: 0.72rem; padding: 5px 12px; border-radius: 12px;
      background: rgba(46,204,113,0.12); color: #69db7c;
      border: 1px solid rgba(46,204,113,0.35); font-weight: 700; letter-spacing: 0.5px;
      align-self: flex-start;
    }

    .device-title {
      display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
    }
    .device-title h3 { font-size: 0.9rem; color: #e0e0e0; flex: 1; }
    .if-badge {
      font-size: 0.68rem; padding: 2px 8px; border-radius: 10px;
      background: #0f3460; color: #a0c4ff;
    }

    .info-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }

    .info-item { padding: 8px 10px; background: #111111; border-radius: 6px; }
    .info-item .key   { font-size: 0.65rem; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
    .info-item .value { font-size: 0.82rem; color: #e0e0e0; font-family: 'Consolas', monospace; word-break: break-all; }
    .info-item .value.highlight { color: #69db7c; font-size: 0.9rem; font-weight: 600; }

    .info-item.wide { grid-column: 1 / -1; }

    .ap-list { font-size: 0.75rem; color: #aaa; margin-top: 4px; }
    .ap-list li { margin-top: 2px; list-style: none; padding-left: 12px; position: relative; }
    .ap-list li::before { content: '›'; position: absolute; left: 0; color: #555; }

    .btn-apply {
      display: inline-block; margin-top: 14px; padding: 8px 20px;
      background: #3b82f6; color: #fff; border: none; border-radius: 4px;
      cursor: pointer; font-size: 0.82rem; font-weight: 600;
    }
    .btn-apply:hover { background: #2563eb; }

    .examples-panel {
      margin-top: 16px; border: 1px solid #2a2a3a; border-radius: 8px; overflow: hidden;
    }
    .examples-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; background: #13131f; cursor: pointer; user-select: none;
      font-size: 0.82rem; font-weight: 700; color: #a0c4ff; letter-spacing: 0.3px;
    }
    .examples-panel-header:hover { background: #1a1a2e; }
    .examples-panel-header .ex-count {
      font-size: 0.72rem; color: #555; font-weight: 400; margin-left: 6px;
    }
    .examples-panel-header .ex-chevron { font-size: 0.7rem; color: #444; transition: transform 0.2s; }
    .examples-panel.open .ex-chevron { transform: rotate(180deg); }
    .examples-body { display: none; background: #0e0e18; }
    .examples-panel.open .examples-body { display: block; }
    .examples-search { padding: 8px 12px; border-bottom: 1px solid #1e1e2e; }
    .examples-search input {
      width: 100%; box-sizing: border-box; background: #1a1a2e;
      border: 1px solid #2a2a4a; border-radius: 4px; color: #e0e0e0;
      font-size: 0.78rem; padding: 7px 10px; outline: none;
    }
    .examples-search input::placeholder { color: #444; }
    .examples-search input:focus { border-color: #5a5aaa; }
    .examples-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
      padding: 10px 12px;
    }
    .proj-tile {
      position: relative; display: flex; flex-direction: column;
      background: #13132a; border: 1px solid #2a2a4a; border-radius: 6px;
      overflow: hidden; transition: border-color 0.15s;
    }
    .proj-tile:hover { border-color: #4a4aaa; }
    .proj-tile a {
      display: flex; align-items: center; justify-content: center; text-align: center;
      padding: 9px 8px; min-height: 48px; flex: 1;
      font-size: 0.73rem; color: #fff; line-height: 1.35;
      text-decoration: none; word-break: break-word;
      background: transparent;
    }
    .proj-tile a:hover { background: #1e1e40; }
    .proj-open-btn {
      display: none; width: 100%; padding: 4px 0;
      background: #1a1a38; border: none; border-top: 1px solid #2a2a4a;
      color: #7a9eff; font-size: 0.67rem; cursor: pointer; letter-spacing: 0.3px;
      transition: background 0.15s, color 0.15s;
    }
    .proj-open-btn:hover { background: #22224a; color: #a0c4ff; }
    .proj-tile:hover .proj-open-btn { display: block; }

    /* e2studio path modal */
    .e2-backdrop {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.75); align-items: center; justify-content: center;
    }
    .e2-backdrop.visible { display: flex; }
    .e2-modal {
      background: #1c1c1c; border: 1px solid #3a3a3a; border-radius: 10px;
      padding: 24px 26px; width: 480px; max-width: 96vw;
      box-shadow: 0 12px 48px rgba(0,0,0,0.7);
    }
    .e2-modal h3 { font-size: 0.95rem; color: #e0e0e0; margin-bottom: 6px; }
    .e2-modal .e2-proj { font-size: 0.78rem; color: #7a9eff; margin-bottom: 18px; font-family: 'Consolas', monospace; }
    .e2-modal label { font-size: 0.72rem; color: #888; display: block; margin-bottom: 5px; }
    .e2-modal input {
      width: 100%; background: #111; border: 1px solid #3a3a3a; color: #e0e0e0;
      padding: 8px 10px; border-radius: 4px; font-size: 0.82rem;
      font-family: 'Consolas', monospace; outline: none; box-sizing: border-box;
    }
    .e2-modal input:focus { border-color: #5a7aff; }
    .e2-modal-actions { display: flex; gap: 10px; margin-top: 16px; }
    .e2-btn-open {
      flex: 1; padding: 9px; background: #3b82f6; color: #fff; border: none;
      border-radius: 4px; cursor: pointer; font-size: 0.82rem; font-weight: 600;
    }
    .e2-btn-open:hover { background: #2563eb; }
    .e2-btn-open:disabled { opacity: 0.4; cursor: not-allowed; }
    .e2-btn-cancel {
      padding: 9px 18px; background: #252525; color: #aaa; border: 1px solid #3a3a3a;
      border-radius: 4px; cursor: pointer; font-size: 0.82rem;
    }
    .e2-btn-cancel:hover { background: #333; }
    .e2-status { font-size: 0.75rem; margin-top: 10px; min-height: 1.2em; }
    .e2-status.ok  { color: #69db7c; }
    .e2-status.err { color: #ff7675; }
    .examples-loading { padding: 14px; font-size: 0.78rem; color: #555; }
    .examples-none    { padding: 14px; font-size: 0.78rem; color: #555; grid-column: 1 / -1; }

    #ex-tooltip {
      position: fixed; z-index: 9999; pointer-events: none; display: none;
      background: #1a1a30; border: 1px solid #3a3a6a; border-radius: 8px;
      padding: 10px 14px; max-width: 240px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.6); line-height: 1.5;
    }
    #ex-tooltip .tt-title { font-size: 0.8rem; font-weight: 700; color: #fff; margin-bottom: 5px; }
    #ex-tooltip .tt-cat   { font-size: 0.72rem; color: #a0c4ff; }
    #ex-tooltip .tt-key   { font-size: 0.68rem; color: #555; margin-top: 4px; }

    .raw-toggle {
      font-size: 0.72rem; color: #555; cursor: pointer; margin-top: 10px; display: block;
    }
    .raw-toggle:hover { color: #aaa; }

    .raw-output {
      display: none; margin-top: 8px; background: #080808;
      border: 1px solid #2e2e2e; border-radius: 4px; padding: 10px;
      font-family: 'Consolas', monospace; font-size: 0.72rem;
      color: #888; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto;
    }

    .scan-spinner {
      display: flex; align-items: center; gap: 12px; color: #aaa;
      font-size: 0.9rem; padding: 40px 0;
    }
    .spinner {
      width: 20px; height: 20px; border: 3px solid #333;
      border-top-color: #aaa; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .no-target {
      color: #ff7675; padding: 10px 0; font-size: 0.85rem;
    }
  </style>
</head>
<body>

<header>
  <div class="header-brand">
<div class="brand-text">
      <span class="brand-name">Renesas 365</span>
      <span class="brand-sub">Powered by Altium</span>
    </div>
  </div>
  <span class="badge disconnected" id="status-badge">Disconnected</span>
  <span class="badge" id="jlink-badge">Detecting...</span>
</header>

<main>
  <!-- LEFT PANEL -->
  <div class="panel-left">

    <!-- SCANNER (top — most important) -->
    <div class="section scan-section">
      <div class="scan-btn-wrap scan-idle">
        <div class="scan-ring scan-ring-1"></div>
        <div class="scan-ring scan-ring-2"></div>
        <div class="scan-ring scan-ring-3"></div>
        <div class="scan-rotating-ring"></div>
        <button class="btn-shazam" id="btn-auto-identify">SCAN</button>
      </div>
      <button class="btn btn-scan" id="btn-scan-probes">List Connected J-Link Probes</button>
    </div>

    <!-- CONNECTION -->
    <div class="section">
      <h3>Session</h3>
      <label>Target Device <span style="color:#555;font-size:0.65rem">(leave blank = auto)</span></label>
      <input id="device" type="text" placeholder="e.g. STM32F407VG">

      <label>Interface</label>
      <select id="iface">
        <option value="SWD">SWD</option>
        <option value="JTAG">JTAG</option>
        <option value="cJTAG">cJTAG</option>
        <option value="FINE">FINE</option>
        <option value="SPI">SPI</option>
      </select>

      <label>Speed (kHz)</label>
      <input id="speed" type="number" value="4000" min="5" max="50000">

      <button class="btn btn-primary" id="btn-start">&#9654; Start Session</button>
      <button class="btn btn-danger"  id="btn-stop" disabled>&#9632; Stop Session</button>
    </div>

    <!-- J-LINK COMMANDS (collapsible) -->
    <div class="section section-collapsible collapsed" id="section-jlink-cmds">
      <div class="section-toggle" onclick="toggleSection('section-jlink-cmds')">
        <h3>J-Link Commands</h3>
        <span class="chevron">&#9660;</span>
      </div>
      <div class="section-body" style="margin-top:10px">
        <div class="quick-actions">
          <button class="btn btn-action" data-cmd="connect&#10;">Connect to Target</button>
          <button class="btn btn-action" data-cmd="r&#10;">Reset Target</button>
          <button class="btn btn-action" data-cmd="halt&#10;">Halt Target</button>
          <button class="btn btn-action" data-cmd="go&#10;">Run (Go)</button>
          <button class="btn btn-action" data-cmd="erase&#10;">Erase Flash</button>
          <button class="btn btn-action" data-cmd="regs&#10;">Show Registers</button>
          <button class="btn btn-action" data-cmd="mem32 0xE000ED00 1&#10;">Read CPUID Register</button>
          <button class="btn btn-action" data-cmd="mem 0x00000000 64&#10;">Mem Dump @ 0x0</button>
          <button class="btn btn-action" data-cmd="ShowEmuList&#10;">List J-Link Probes</button>
        </div>
        <label style="margin-top:10px">Script (one command per line)</label>
        <textarea class="script-area" id="script-area"
          placeholder="connect&#10;r&#10;h&#10;loadfile firmware.hex&#10;r&#10;go"></textarea>
        <button class="btn btn-action" id="btn-run-script">&#9654; Run Script</button>
      </div>
    </div>

    <div class="jlink-path-info" id="jlink-path-info">Searching for JLink.exe...</div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel-right">

    <!-- SCAN RESULTS OVERLAY -->
    <div id="scan-overlay">
      <div class="scan-header">
        <h2 id="overlay-title">Scan Results</h2>
        <button class="btn-close" id="btn-close-overlay">&#10005; Close</button>
      </div>
      <div id="scan-content"></div>
    </div>

    <!-- TERMINAL -->
    <div class="terminal-toolbar">
      <span id="session-info"></span>
      <button class="btn-small" id="btn-clear">Clear</button>
    </div>

    <div id="terminal"></div>

    <div class="input-row">
      <input id="cmd-input" type="text" placeholder="Type J-Link command and press Enter..." disabled>
      <button id="cmd-send" disabled>Send</button>
    </div>
  </div>
</main>

<!-- e2studio path modal -->
<div class="e2-backdrop" id="e2-backdrop">
  <div class="e2-modal">
    <h3>&#128194; Open in e2studio</h3>
    <div class="e2-proj" id="e2-proj-name"></div>
    <label>Local path to open as workspace</label>
    <input type="text" id="e2-path-input" placeholder="C:\path\to\project">
    <div class="e2-modal-actions">
      <button class="e2-btn-open" id="e2-btn-open">&#9654; Launch e2studio</button>
      <button class="e2-btn-cancel" id="e2-btn-cancel">Cancel</button>
    </div>
    <div class="e2-status" id="e2-status"></div>
  </div>
</div>

<script>
  const terminal     = document.getElementById('terminal');
  const statusBadge  = document.getElementById('status-badge');
  const jlinkBadge   = document.getElementById('jlink-badge');
  const jlinkInfo    = document.getElementById('jlink-path-info');
  const sessionInfo  = document.getElementById('session-info');
  const cmdInput     = document.getElementById('cmd-input');
  const cmdSend      = document.getElementById('cmd-send');
  const btnStart     = document.getElementById('btn-start');
  const btnStop      = document.getElementById('btn-stop');
  const btnRunScript = document.getElementById('btn-run-script');
  const scanOverlay  = document.getElementById('scan-overlay');
  const scanContent  = document.getElementById('scan-content');
  const overlayTitle = document.getElementById('overlay-title');

  let ws = null;
  let sessionActive = false;
  let cmdHistory = [];
  let historyIdx  = -1;

  // ── J-Link detection ──────────────────────────────────────────────────────
  fetch('/api/jlink-path').then(r => r.json()).then(({ path, found }) => {
    if (found) {
      jlinkBadge.textContent = 'J-Link Found';
      jlinkBadge.style.background = '#1a472a';
      jlinkBadge.style.color = '#69db7c';
      jlinkInfo.textContent = path;
    } else {
      jlinkBadge.textContent = 'J-Link NOT Found';
      jlinkBadge.style.background = '#4a1122';
      jlinkBadge.style.color = '#ff8787';
      jlinkInfo.textContent = 'JLink.exe not found in standard locations.';
    }
  });

  // ── Terminal helpers ──────────────────────────────────────────────────────
  function termWrite(text, cls) {
    const span = document.createElement('span');
    if (cls) span.className = cls;
    span.textContent = text;
    terminal.appendChild(span);
    terminal.scrollTop = terminal.scrollHeight;
  }

  // ── WebSocket / session ───────────────────────────────────────────────────
  function wsConnect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}`);

    ws.onopen = () => {
      statusBadge.textContent = 'Connected';
      statusBadge.className = 'badge connected';
    };
    ws.onclose = () => {
      statusBadge.textContent = 'Disconnected';
      statusBadge.className = 'badge disconnected';
      setSessionActive(false);
      ws = null;
    };
    ws.onerror = () => termWrite('\r\n[WebSocket error]\r\n', 'text-error');
    ws.onmessage = evt => {
      const msg = JSON.parse(evt.data);
      const cls = msg.type === 'stderr' ? 'text-stderr'
                : msg.type === 'error'  ? 'text-error'
                : msg.type === 'exit'   ? 'text-exit'
                : msg.type === 'info'   ? 'text-info'
                : null;
      termWrite(msg.data, cls);
    };
  }

  function startSession() {
    if (!ws || ws.readyState !== WebSocket.OPEN) wsConnect();
    setTimeout(() => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      const dev   = document.getElementById('device').value.trim();
      const iface = document.getElementById('iface').value;
      const spd   = document.getElementById('speed').value;
      ws.send(JSON.stringify({ type: 'start', device: dev, interface: iface, speed: spd }));
      setSessionActive(true);
      sessionInfo.textContent = `Session active — Device: ${dev || '(auto)'}, IF: ${iface}, Speed: ${spd} kHz`;
    }, 300);
  }

  function stopSession() {
    if (ws && ws.readyState === WebSocket.OPEN)
      ws.send(JSON.stringify({ type: 'stop' }));
    setSessionActive(false);
    sessionInfo.textContent = 'No active session';
  }

  function setSessionActive(active) {
    sessionActive     = active;
    cmdInput.disabled = !active;
    cmdSend.disabled  = !active;
    btnStart.disabled = active;
    btnStop.disabled  = !active;
  }

  function sendCommand(cmd) {
    if (!ws || ws.readyState !== WebSocket.OPEN || !sessionActive) return;
    if (cmd.trim()) { cmdHistory.unshift(cmd.trim()); if (cmdHistory.length > 100) cmdHistory.pop(); historyIdx = -1; }
    ws.send(JSON.stringify({ type: 'input', data: cmd }));
  }

  // ── Overlay helpers ───────────────────────────────────────────────────────
  function showOverlay(title, html) {
    overlayTitle.textContent = title;
    scanContent.innerHTML = html;
    scanOverlay.classList.add('visible');
  }
  function hideOverlay() { scanOverlay.classList.remove('visible'); }

  document.getElementById('btn-close-overlay').addEventListener('click', hideOverlay);

  function infoItem(key, value, wide, highlight) {
    return `<div class="info-item${wide?' wide':''}">
      <div class="key">${key}</div>
      <div class="value${highlight?' highlight':''}">${value}</div>
    </div>`;
  }

  // ── SCAN PROBES ───────────────────────────────────────────────────────────
  document.getElementById('btn-scan-probes').addEventListener('click', async () => {
    showOverlay('Scanning for J-Link Probes…',
      `<div class="scan-spinner"><div class="spinner"></div>Querying USB for J-Link devices…</div>`);

    try {
      const res = await fetch('/api/scan-probes');
      const { probes, raw } = await res.json();

      if (!probes.length) {
        showOverlay('J-Link Probes', `
          <div class="probe-card">
            <div class="no-target">No J-Link probes detected on USB.</div>
            <div class="raw-output" style="display:block;margin-top:12px">${escHtml(raw)}</div>
          </div>`);
        return;
      }

      let html = '';
      for (const p of probes) {
        html += `<div class="probe-card">
          <div class="probe-title">J-Link Probe [${p.index}]</div>
          <div class="info-grid">
            ${infoItem('Product',    p.product,    false, true)}
            ${infoItem('Connection', p.connection, false)}
            ${infoItem('Serial',     p.serial,     false)}
          </div>
        </div>`;
      }
      html += rawBlock(raw);
      showOverlay(`${probes.length} J-Link Probe(s) Found`, html);
    } catch (err) {
      showOverlay('Error', `<div class="no-target">${escHtml(err.message)}</div>`);
    }
  });

  // ── AUTO-IDENTIFY TARGET ──────────────────────────────────────────────────
  function buildScanResultsHtml(data) {
    let html = '';
    for (const r of data.results) {
      const ok  = r.connected;
      const inf = r.info || {};

      html += `<div class="device-card ${ok ? 'success' : 'failed'}">`;

      if (ok) {
        const hint  = inf.vendorHint || {};
        const board = hint.board      || inf.core || 'Target Found';
        const part  = hint.partNumber || '';
        const fam   = hint.vendor && hint.family ? `${hint.vendor} · ${hint.family}` : (inf.core || '');
        html += `
          <div class="found-banner">
            <div class="found-icon">&#9989;</div>
            <div class="found-text">
              <div class="found-label">&#128269; Target Identified</div>
              <div class="found-board">${escHtml(board)}</div>
              ${part ? `<div class="found-part">${escHtml(part)}</div>` : ''}
              ${fam  ? `<div class="found-family">${escHtml(fam)}</div>` : ''}
            </div>
            <span class="found-iface">${escHtml(r.interface)}</span>
          </div>`;
      } else {
        html += `
          <div class="device-title">
            <h3>&#10060; Not Found via ${escHtml(r.interface)}</h3>
            <span class="if-badge">${escHtml(r.interface)}</span>
          </div>`;
      }

      if (ok) {
        const hint = inf.vendorHint || null;
        if (hint) {
          html += `<div style="background:#111;border:1px solid #2e2e2e;border-radius:6px;padding:10px 14px;margin-bottom:12px">
            <div style="font-size:0.7rem;color:#69db7c;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Vendor / Product Identification</div>
            <div style="font-size:0.9rem;color:#e0e0e0;font-weight:600">${escHtml(hint.vendor)} — ${escHtml(hint.family)}</div>
            ${hint.note ? `<div style="font-size:0.75rem;color:#aaa;margin-top:3px">${escHtml(hint.note)}</div>` : ''}
          </div>`;
        }
        html += `<div class="info-grid">
          ${inf.core         ? infoItem('Core',          inf.core,                        false, true) : ''}
          ${inf.revision     ? infoItem('Revision',      inf.revision,                    false) : ''}
          ${inf.architecture ? infoItem('Architecture',  inf.architecture,                false) : ''}
          ${inf.endian       ? infoItem('Endianness',    inf.endian,                      false) : ''}
          ${inf.implementer  ? infoItem('Implementer',   inf.implementer,                 false) : ''}
          ${inf.cpuidRaw     ? infoItem('CPUID',         inf.cpuidRaw,                    false) : ''}
          ${inf.idcode       ? infoItem('JTAG/SW-DP ID', inf.idcode,                      false) : ''}
          ${inf.dpVersion    ? infoItem('Debug Port',    inf.dpVersion,                   false) : ''}
          ${inf.fpu          ? infoItem('FPU',           inf.fpu,                         false) : ''}
          ${inf.security     ? infoItem('Security',      inf.security,                    false) : ''}
          ${inf.pacbti       ? infoItem('PACBTI',        inf.pacbti,                      false) : ''}
          ${(inf.icacheKB != null) ? infoItem('I-Cache', inf.icacheKB + ' KB L1',         false) : ''}
          ${(inf.dcacheKB != null) ? infoItem('D-Cache', inf.dcacheKB + ' KB L1',         false) : ''}
          ${r.usedDevice     ? infoItem('J-Link Device', r.usedDevice,                    false) : ''}
          ${inf.detectedDevice ? infoItem('Device Name', inf.detectedDevice,              true)  : ''}
          ${(inf.flashKB != null) ? infoItem('Flash',    inf.flashKB + ' kB',             false) : ''}
          ${(inf.ramKB   != null) ? infoItem('RAM',      inf.ramKB   + ' kB',             false) : ''}
        </div>`;

        if (inf.accessPorts && inf.accessPorts.length) {
          html += `<div class="info-item wide" style="margin-top:8px">
            <div class="key">Access Ports</div>
            <ul class="ap-list">${inf.accessPorts.map(a=>`<li>${escHtml(a)}</li>`).join('')}</ul>
          </div>`;
        }

        const applyDevice = inf.detectedDevice || '';
        const applyIface  = r.interface;
        html += `<button class="btn-apply"
            onclick="applyToSession(${JSON.stringify(applyDevice)}, ${JSON.stringify(applyIface)})">
            &#9654; Apply to Session &amp; Start
          </button>`;

        if (hint && hint.board) {
          html += `<div class="examples-panel open" id="ex-panel-${escHtml(hint.board)}">
            <div class="examples-panel-header" onclick="toggleExamples(this)">
              <span>&#128230; Projects<span class="ex-count" id="ex-count-${escHtml(hint.board)}"></span></span>
              <span class="ex-chevron">&#9660;</span>
            </div>
            <div class="examples-body">
              <div class="examples-search">
                <input type="text" placeholder="🔍  Search projects…"
                  oninput="filterExamples('${escHtml(hint.board)}', this.value)"
                  onclick="event.stopPropagation()">
              </div>
              <div class="examples-grid" id="ex-grid-${escHtml(hint.board)}">
                <div class="examples-loading">Loading…</div>
              </div>
            </div>
          </div>`;
        }
      } else if (r.error) {
        html += `<div class="no-target">${escHtml(r.error)}</div>`;
      } else {
        html += `<div class="no-target">No target responded on ${r.interface}.</div>`;
        if (r.obProbe) {
          html += `<div style="margin-top:10px;padding:10px 14px;background:#1a1400;border:1px solid #5a4a00;border-radius:6px;font-size:0.78rem;">
            <div style="color:#f0b429;font-weight:700;margin-bottom:6px;">⚠️ Probe OK — Target MCU Not Responding to SWD</div>
            <div style="color:#aaa;line-height:1.7;">
              &bull; <b style="color:#ddd;">Debug protection locked</b> — OFSM option bytes disabled debug access. Use <i>Renesas Flash Programmer</i> or <i>J-Flash</i> to unlock.<br>
              &bull; <b style="color:#ddd;">Application firmware</b> reconfigured SWD pins as GPIO — power-cycle the board and retry immediately after reset.<br>
              &bull; <b style="color:#ddd;">MCU in boot error / fault loop</b> — hold RESET button while clicking Scan.
            </div>
          </div>`;
        }
      }

      html += rawBlock(r.raw || '', !ok) + '</div>';
    }
    return html;
  }

  async function runAutoIdentify() {
    const scanWrap = document.querySelector('.scan-btn-wrap');
    scanWrap.classList.remove('scan-idle');
    jlinkBadge.textContent = 'Scanning…';
    jlinkBadge.className = 'badge scanning';
    showOverlay('Identifying Target — Please Wait…',
      `<div class="scan-spinner"><div class="spinner"></div>
       Auto-connecting via SWD then JTAG… (up to ~25 s)</div>`);
    try {
      const res  = await fetch('/api/auto-identify', { method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}' });
      const data = await res.json();
      const anyFound = data.results.some(r => r.connected);
      const html  = buildScanResultsHtml(data);
      const title = anyFound ? 'Target Identified' : 'No Target Found';
      showOverlay(title, html);
      for (const r of data.results) {
        const board = r.info?.vendorHint?.board;
        if (r.connected && board) fetchExamples(board);
      }
      jlinkBadge.textContent = 'J-Link Found';
      jlinkBadge.className = 'badge';
      jlinkBadge.style.background = '#1a472a';
      jlinkBadge.style.color = '#69db7c';
    } catch (err) {
      showOverlay('Error', `<div class="no-target">${escHtml(err.message)}</div>`);
      jlinkBadge.textContent = 'J-Link Found';
      jlinkBadge.className = 'badge';
    } finally {
      scanWrap.classList.add('scan-idle');
    }
  }

  document.getElementById('btn-auto-identify').addEventListener('click', runAutoIdentify);

  // Apply scan result to session and start
  function applyToSession(device, iface) {
    document.getElementById('device').value = device;
    document.getElementById('iface').value  = iface;
    hideOverlay();
    startSession();
  }
  window.applyToSession = applyToSession;

  async function fetchExamples(board) {
    const grid  = document.getElementById(`ex-grid-${board}`);
    const count = document.getElementById(`ex-count-${board}`);
    if (!grid) return;
    try {
      const res  = await fetch(`/api/examples?board=${encodeURIComponent(board)}`);
      const data = await res.json();
      if (data.projects && data.projects.length) {
        const sorted = data.projects.slice().sort((a, b) => a.name.localeCompare(b.name));
        const staleNote = data.stale ? ' <span style="color:#ffd166;font-size:0.67rem">(cached)</span>' : '';
        if (count) count.innerHTML = ` (${sorted.length})${staleNote}`;
        grid._allProjects = sorted;
        renderProjectGrid(grid, sorted);
      } else if (data.rateLimited) {
        grid.innerHTML = `<div class="examples-none" style="color:#ffd166">
          ⚠ GitHub API rate limit reached — projects will load automatically once it resets (up to 1 h).
          <br><br><button onclick="fetchExamples('${escHtml(board)}')" style="margin-top:6px;padding:4px 12px;background:#2a2a2a;color:#aaa;border:1px solid #444;border-radius:4px;cursor:pointer;font-size:0.75rem">Retry</button>
        </div>`;
      } else {
        grid.innerHTML = `<div class="examples-none">No projects found for ${escHtml(board)}.</div>`;
      }
    } catch(e) {
      grid.innerHTML = `<div class="examples-none">Could not load projects (${escHtml(e.message)}).</div>`;
    }
  }

  const EX_CATEGORIES = {
    adc:'Analog-to-Digital Converter', dac:'Digital-to-Analog Converter',
    ble:'Bluetooth Low Energy', wifi:'Wi-Fi', eth:'Ethernet', ptp:'Precision Time Protocol',
    usb:'USB', cdc:'USB CDC', hid:'USB HID',
    i2c:'I2C Communication', iic:'I2C Communication', spi:'SPI Communication',
    uart:'UART Communication', sci:'Serial Communication Interface',
    can:'CAN Bus', canfd:'CAN FD Bus',
    rtc:'Real-Time Clock', wdt:'Watchdog Timer', iwdt:'Independent Watchdog Timer',
    gpt:'General Purpose Timer', agt:'Async General-Purpose Timer', tim:'Timer',
    flash:'Flash Memory', qspi:'QSPI Flash', ospi:'Octal SPI Flash',
    sdhi:'SD Card / eMMC', filex:'FileX File System',
    netxduo:'NetX Duo Networking', netx:'NetX Networking',
    freertos:'FreeRTOS', threadx:'ThreadX RTOS',
    trustzone:'TrustZone Security', crypto:'Cryptography',
    lpm:'Low Power Mode', dmac:'DMA Controller', dma:'DMA Controller',
    gpio:'GPIO', pwm:'PWM Output', dac8:'8-bit DAC',
    aws:'AWS IoT', azure:'Azure IoT', quickstart:'Quick Start Guide',
    elc:'Event Link Controller', icu:'Interrupt Controller Unit',
    mtu:'Multi-function Timer', poeg:'Port Output Enable for GPT',
    acmplp:'Low-Power Analog Comparator', opamp:'Operational Amplifier',
    iirfa:'IIR Filter Accelerator', fft:'FFT Accelerator',
  };

  function projectLabel(name) {
    const prefix = name.split('_')[0].toLowerCase();
    const category = EX_CATEGORIES[prefix] || null;
    const title = name.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    return { title, category };
  }

  // Tooltip
  const exTip = document.createElement('div');
  exTip.id = 'ex-tooltip';
  document.body.appendChild(exTip);

  document.addEventListener('mousemove', e => {
    if (exTip.style.display !== 'none') {
      const x = e.clientX + 16, y = e.clientY + 16;
      exTip.style.left = (x + exTip.offsetWidth > window.innerWidth ? e.clientX - exTip.offsetWidth - 8 : x) + 'px';
      exTip.style.top  = (y + exTip.offsetHeight > window.innerHeight ? e.clientY - exTip.offsetHeight - 8 : y) + 'px';
    }
  });

  function showProjectTip(event, name) {
    const { title, category } = projectLabel(name);
    exTip.innerHTML = `<div class="tt-title">${escHtml(title)}</div>
      ${category ? `<div class="tt-cat">&#128193; ${escHtml(category)}</div>` : ''}
      <div class="tt-key">&#128279; Click to open on GitHub</div>`;
    exTip.style.display = 'block';
  }
  function hideProjectTip() { exTip.style.display = 'none'; }
  window.showProjectTip = showProjectTip;
  window.hideProjectTip = hideProjectTip;

  function renderProjectGrid(grid, projects) {
    if (!projects.length) {
      grid.innerHTML = '<div class="examples-none">No matching projects.</div>';
      return;
    }
    grid.innerHTML = projects.map(p =>
      `<div class="proj-tile"
          onmouseenter="showProjectTip(event,'${escHtml(p.name)}')"
          onmouseleave="hideProjectTip()">
        <a href="${p.url}" target="_blank" rel="noopener">${escHtml(p.name)}</a>
        <button class="proj-open-btn"
          onclick="showE2Modal('${escHtml(p.name)}',event)">&#128194; Open in e2studio</button>
      </div>`
    ).join('');
  }

  // ── e2studio modal ────────────────────────────────────────────────────────
  const E2_BASE_PATH_KEY = 'e2studio_base_path';

  function showE2Modal(projectName, evt) {
    if (evt) { evt.stopPropagation(); hideProjectTip(); }
    const base = localStorage.getItem(E2_BASE_PATH_KEY) || 'C:\\workspace';
    document.getElementById('e2-proj-name').textContent = projectName;
    document.getElementById('e2-path-input').value = base + '\\' + projectName;
    document.getElementById('e2-status').textContent = '';
    document.getElementById('e2-status').className = 'e2-status';
    document.getElementById('e2-btn-open').disabled = false;
    document.getElementById('e2-backdrop').classList.add('visible');
    document.getElementById('e2-path-input').focus();
    document.getElementById('e2-path-input').select();
  }
  window.showE2Modal = showE2Modal;

  function hideE2Modal() {
    document.getElementById('e2-backdrop').classList.remove('visible');
  }

  document.getElementById('e2-btn-cancel').addEventListener('click', hideE2Modal);
  document.getElementById('e2-backdrop').addEventListener('click', e => {
    if (e.target === document.getElementById('e2-backdrop')) hideE2Modal();
  });

  document.getElementById('e2-path-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('e2-btn-open').click();
    if (e.key === 'Escape') hideE2Modal();
  });

  document.getElementById('e2-btn-open').addEventListener('click', async () => {
    const pathVal = document.getElementById('e2-path-input').value.trim();
    if (!pathVal) return;

    // Save the parent folder as the new base for next time
    const lastSlash = Math.max(pathVal.lastIndexOf('\\'), pathVal.lastIndexOf('/'));
    if (lastSlash > 0) localStorage.setItem(E2_BASE_PATH_KEY, pathVal.slice(0, lastSlash));

    const btn    = document.getElementById('e2-btn-open');
    const status = document.getElementById('e2-status');
    btn.disabled = true;
    status.className = 'e2-status';
    status.textContent = 'Launching…';

    try {
      const res  = await fetch('/api/open-e2studio', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: pathVal }),
      });
      const data = await res.json();
      if (data.ok) {
        status.className = 'e2-status ok';
        status.textContent = '✔ e2studio launched';
        setTimeout(hideE2Modal, 1200);
      } else {
        status.className = 'e2-status err';
        status.textContent = data.error || 'Failed to launch';
        btn.disabled = false;
      }
    } catch (err) {
      status.className = 'e2-status err';
      status.textContent = err.message;
      btn.disabled = false;
    }
  });

  function filterExamples(board, query) {
    const grid = document.getElementById(`ex-grid-${board}`);
    if (!grid || !grid._allProjects) return;
    const q = query.trim().toLowerCase();
    const filtered = q ? grid._allProjects.filter(p => p.name.toLowerCase().includes(q)) : grid._allProjects;
    const count = document.getElementById(`ex-count-${board}`);
    if (count) count.textContent = ` (${filtered.length}${q ? ' matched' : ''})`;
    renderProjectGrid(grid, filtered);
  }
  window.filterExamples = filterExamples;

  function toggleExamples(header) {
    header.closest('.examples-panel').classList.toggle('open');
  }
  window.toggleExamples = toggleExamples;

  function toggleSection(id) {
    document.getElementById(id).classList.toggle('collapsed');
  }
  window.toggleSection = toggleSection;

  // ── Shared utils ──────────────────────────────────────────────────────────
  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function rawBlock(raw, autoShow = false) {
    if (!raw) return '';
    const id = 'raw_' + Math.random().toString(36).slice(2);
    const shown = autoShow ? 'block' : 'none';
    const label = autoShow ? '&#9660; Hide raw J-Link output' : '&#9654; Show raw J-Link output';
    return `<span class="raw-toggle" onclick="toggleRaw('${id}')">${label}</span>
      <pre class="raw-output" id="${id}" style="display:${shown}">${escHtml(raw)}</pre>`;
  }

  function toggleRaw(id) {
    const el = document.getElementById(id);
    const span = el.previousSibling;
    if (el.style.display === 'block') {
      el.style.display = 'none';
      span.textContent = '▶ Show raw J-Link output';
    } else {
      el.style.display = 'block';
      span.textContent = '▼ Hide raw J-Link output';
    }
  }
  window.toggleRaw = toggleRaw;

  // ── Event wiring ──────────────────────────────────────────────────────────
  btnStart.addEventListener('click', startSession);
  btnStop.addEventListener('click', stopSession);
  document.getElementById('btn-clear').addEventListener('click', () => { terminal.innerHTML = ''; });

  cmdSend.addEventListener('click', () => { sendCommand(cmdInput.value + '\n'); cmdInput.value = ''; });

  cmdInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      sendCommand(cmdInput.value + '\n'); cmdInput.value = '';
    } else if (e.key === 'ArrowUp') {
      historyIdx = Math.min(historyIdx + 1, cmdHistory.length - 1);
      if (cmdHistory[historyIdx] !== undefined) cmdInput.value = cmdHistory[historyIdx];
      e.preventDefault();
    } else if (e.key === 'ArrowDown') {
      historyIdx = Math.max(historyIdx - 1, -1);
      cmdInput.value = historyIdx >= 0 ? cmdHistory[historyIdx] : '';
      e.preventDefault();
    }
  });

  document.querySelectorAll('.btn-action[data-cmd]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!sessionActive) { termWrite('\r\n[Start a session first]\r\n', 'text-error'); return; }
      sendCommand(btn.dataset.cmd);
    });
  });

  btnRunScript.addEventListener('click', async () => {
    const script = document.getElementById('script-area').value.trim();
    if (!script) return;
    termWrite('\r\n── Running Script (non-interactive) ──\r\n', 'text-info');
    btnRunScript.disabled = true;
    btnRunScript.textContent = 'Running…';
    try {
      const res = await fetch('/api/run-script', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          script,
          device:    document.getElementById('device').value.trim(),
          interface: document.getElementById('iface').value,
          speed:     document.getElementById('speed').value,
        }),
      });
      const data = await res.json();
      if (data.stdout) termWrite(data.stdout, null);
      if (data.stderr) termWrite(data.stderr, 'text-stderr');
      termWrite(`\r\n── Script exited (code ${data.exitCode}) ──\r\n`, 'text-exit');
    } catch (err) {
      termWrite(`\r\n[Script error: ${err.message}]\r\n`, 'text-error');
    } finally {
      btnRunScript.disabled = false;
      btnRunScript.textContent = '▶ Run Script (non-interactive)';
    }
  });
</script>
</body>
</html>
