document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Archivo Narrow';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"0184af63-fb1e-4337-bd6c-ff9be74bbc8c\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Archivo Narrow';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"d829c213-ab37-440b-afff-bc0febc42563\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Archivo Narrow';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"892cfdea-5a2f-443e-abbc-7490136aa20f\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Archivo Narrow';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"0184af63-fb1e-4337-bd6c-ff9be74bbc8c\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Archivo Narrow';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"d829c213-ab37-440b-afff-bc0febc42563\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n@font-face {\n  font-family: \"Arial Narrow\";\n  src: url(\"8256ad50-785a-42df-baac-cb9c3ac21461\") format('truetype');\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n\n/* メイリオ / Meiryo is the Japanese OS-level body font specified by\n   the style guide. It is licensed with the operating system and\n   cannot be shipped as a webfont, so these local()-only faces map\n   the family to the user's installed copy — no binary, no\n   substitution of a different family. */\n@font-face {\n  font-family: \"メイリオ\";\n  src: local(\"メイリオ\"), local(\"Meiryo\");\n  font-style: normal;\n}\n@font-face {\n  font-family: \"Meiryo\";\n  src: local(\"Meiryo\"), local(\"メイリオ\");\n  font-style: normal;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   Renesas — Color tokens\n   Source of truth: Renesas Brand Book (ENG), May 2026.\n   Supersedes the 2020 PowerPoint Style Guide for color.\n   ------------------------------------------------------------\n   Corporate color is \"Renesas Blue\" = Pantone Reflex Blue C,\n   RGB 42/40/157 = #2A289D, used everywhere INCLUDING PowerPoint\n   (the Brand Book color is authoritative; the older on-screen\n   #06418C is no longer used). --renesas-blue-ppt is kept as an\n   alias for compatibility and now resolves to #2A289D too.\n   ============================================================ */\n\n:root {\n  /* ---- Brand core ------------------------------------------------ */\n  --renesas-blue:        #2A289D;  /* CORPORATE Renesas Blue (Reflex Blue C, RGB 42/40/157) */\n  --renesas-blue-ppt:    #2A289D;  /* PowerPoint blue — aligned to the corporate color per Brand Book (May 2026) */\n  --renesas-blue-link:   #2A289D;  /* hyperlinks / headline + body emphasis */\n  --renesas-ink:         #3C3C3B;  /* near-black, primary running text */\n  --renesas-grey:        #706F6F;  /* corporate Renesas Gray (CoolGray 7540 C, RGB 112/111/111) */\n  --renesas-white:       #FFFFFF;\n  --renesas-paper:       #F2F2F2;  /* light surface */\n\n  /* ---- Secondary palette (Brand Book p.44) ----------------------\n     Highlights for graphics, tables, charts and infographics.\n     All may also be used in paler gradation. */\n  --accent-indigo:       #615E8E;  /* RGB 97/94/142 */\n  --accent-teal:         #60A9B4;  /* RGB 96/169/180 */\n  --accent-blue:         #43ABE2;  /* RGB 67/171/226 — bright sky blue */\n  --accent-deepteal:     #306683;  /* RGB 48/102/131 */\n  --accent-slate:        #7C909B;  /* RGB 124/144/155 */\n  --accent-yellow:       #DFB118;  /* RGB 223/177/24 — gold */\n  --accent-orange:       #EB6209;  /* RGB 235/98/9 */\n  --accent-red:          #B71921;  /* RGB 183/25/33 */\n  --accent-purple:       #883D90;  /* RGB 136/61/144 */\n  --accent-green:        #609A3B;  /* RGB 96/154/59 */\n  --accent-olive:        #758859;  /* RGB 117/136/89 */\n  --accent-black:        #000000;\n\n  /* ---- Diagram / chart palette ----------------------------------\n     Brand secondary colors expressed in light / medium / dark\n     intensities for charts. Use medium as the base; tints for\n     fills, shades for emphasis/labels. */\n  /* light (tint) */\n  --chart-blue-light:    #B4DCF4;\n  --chart-teal-light:    #BDDDE2;\n  --chart-yellow-light:  #F1DD93;\n  --chart-green-light:   #BDD9A8;\n  --chart-red-light:     #E6A7AB;\n  --chart-purple-light:  #CBA6CF;\n  /* medium (base = brand secondary) */\n  --chart-blue:          #43ABE2;\n  --chart-teal:          #60A9B4;\n  --chart-yellow:        #DFB118;\n  --chart-green:         #609A3B;\n  --chart-red:           #B71921;\n  --chart-purple:        #883D90;\n  /* dark (shade) */\n  --chart-blue-dark:     #306683;\n  --chart-teal-dark:     #3C6A72;\n  --chart-yellow-dark:   #9C7B0F;\n  --chart-green-dark:    #436B29;\n  --chart-red-dark:      #7E1016;\n  --chart-purple-dark:   #5E2A64;\n\n  /* ---- Neutral ramp --------------------------------------------- */\n  --grey-900:            #3C3C3C;\n  --grey-700:            #706F6F;  /* corporate Renesas Gray */\n  --grey-500:            #9D9D9D;\n  --grey-300:            #B5B5B5;\n  --grey-200:            #D9D9D9;\n  --grey-100:            #F2F2F2;\n\n  /* ---- Semantic aliases ----------------------------------------- */\n  --text-primary:        var(--renesas-ink);\n  --text-secondary:      var(--grey-700);\n  --text-muted:          var(--grey-500);\n  --text-on-blue:        var(--renesas-white);\n  --text-link:           var(--renesas-blue-link);\n\n  --surface-page:        var(--renesas-white);\n  --surface-card:        var(--renesas-white);\n  --surface-subtle:      var(--renesas-paper);\n  --surface-grey:        var(--renesas-grey);\n  --surface-brand:       var(--renesas-blue);\n\n  --border-default:      var(--grey-200);\n  --border-strong:       var(--renesas-grey);\n  --border-brand:        var(--renesas-blue);\n  --border-accent:       var(--accent-blue);\n\n  --bullet-blue:         var(--renesas-blue);  /* L1/L2 square bullets */\n  --bullet-line:         var(--renesas-ink);   /* L4/L5 line bullets */\n\n  --status-error:        var(--accent-red);\n  --status-warning:      var(--accent-yellow);\n  --status-success:      var(--accent-green);\n  --status-info:         var(--renesas-blue);\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   Renesas — Typography tokens\n   Style guide: Arial (body) + Arial Narrow (titles/subheads).\n   Titles use CAPITAL letters. Sizes optimized for on-screen\n   slides — Title 32pt, Subtitle 20pt, Body 16pt (scalable to\n   20pt for large audiences).\n   ============================================================ */\n\n:root {\n  /* ---- Font families -------------------------------------------- */\n  --font-display: \"Arial Narrow\", \"Archivo Narrow\", Arial, \"Helvetica Neue\", Helvetica, sans-serif;\n  --font-body:    Arial, \"Helvetica Neue\", Helvetica, \"Liberation Sans\", \"メイリオ\", Meiryo, sans-serif;\n  --font-mono:    \"Consolas\", \"SFMono-Regular\", Menlo, Monaco, monospace;\n\n  /* ---- Weights -------------------------------------------------- */\n  --weight-regular: 400;\n  --weight-medium:  500;\n  --weight-bold:    700;\n\n  /* ---- Slide type scale (the source-of-truth pt sizes) ----------\n     1pt ≈ 1.333px. Expressed here in px for screen use. */\n  --size-slide-title:    43px;  /* 32pt */\n  --size-slide-subtitle: 27px;  /* 20pt */\n  --size-slide-body:     21px;  /* 16pt */\n  --size-slide-body-lg:  27px;  /* 20pt — large audience */\n\n  /* ---- UI / web type scale -------------------------------------- */\n  --size-display:  40px;\n  --size-h1:       32px;\n  --size-h2:       24px;\n  --size-h3:       20px;\n  --size-body-lg:  18px;\n  --size-body:     16px;\n  --size-body-sm:  14px;\n  --size-caption:  12px;\n\n  /* ---- Line heights --------------------------------------------- */\n  --leading-tight:   1.1;\n  --leading-heading: 1.2;\n  --leading-snug:    1.35;\n  --leading-body:    1.5;\n\n  /* ---- Letter spacing ------------------------------------------- */\n  --tracking-title:  0.01em;   /* slight, for ALL-CAPS titles */\n  --tracking-normal: 0;\n  --tracking-wide:   0.06em;   /* labels / eyebrows */\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   Renesas — Spacing, radii, borders, shadows, layout\n   The PowerPoint system is a flat, squared, grid-based design:\n   minimal rounding, thin rules, restrained shadows.\n   ============================================================ */\n\n:root {\n  /* ---- Spacing scale (4px base) --------------------------------- */\n  --space-0:   0;\n  --space-1:   4px;\n  --space-2:   8px;\n  --space-3:   12px;\n  --space-4:   16px;\n  --space-5:   24px;\n  --space-6:   32px;\n  --space-7:   48px;\n  --space-8:   64px;\n  --space-9:   96px;\n\n  /* ---- Radii — Renesas is squared; rounding is minimal ---------- */\n  --radius-none: 0;\n  --radius-sm:   2px;\n  --radius-md:   4px;\n  --radius-pill: 999px;\n\n  /* ---- Borders -------------------------------------------------- */\n  --border-hairline: 1px;\n  --border-rule:     2px;   /* heading underline / divider rules */\n  --border-accent:   4px;   /* left accent bars */\n\n  /* ---- Shadows — restrained, flat brand ------------------------- */\n  --shadow-none: none;\n  --shadow-card: 0 1px 3px rgba(60, 60, 59, 0.12);\n  --shadow-pop:  0 4px 16px rgba(60, 60, 59, 0.16);\n  --shadow-modal:0 12px 40px rgba(42, 40, 157, 0.20);\n\n  /* ---- Motion — style guide: Fade transitions, Fade/Wipe anims -- */\n  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */\n  --duration-fast: 120ms; /* @kind other */\n  --duration-base: 200ms; /* @kind other */\n  --duration-slow: 320ms; /* @kind other */\n\n  /* ---- Slide canvas -------------------------------------------- */\n  --slide-w: 1280px;\n  --slide-h: 720px;\n  --slide-margin: 56px;     /* outer safe margin / design grid */\n  --slide-rule: var(--renesas-blue);\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   Renesas Design System — global entry point\n   Consumers link THIS file. It is an @import manifest only.\n   ============================================================ */\n\n/* ============================================================\n   Renesas — Fonts\n   ------------------------------------------------------------\n   The Renesas PowerPoint system specifies ARIAL (body) and\n   ARIAL NARROW (headlines / subheads). Both are proprietary\n   system fonts and cannot be shipped as webfonts. For web\n   fidelity we map:\n     - Arial          -> native Arial stack (universally present)\n     - Arial Narrow   -> native Arial Narrow, falling back to the\n                         Google webfont \"Archivo Narrow\" so the\n                         condensed display look survives on\n                         non-Windows / non-Mac systems.\n   East-Asian equivalents from the style guide are kept in the\n   stacks: Meiryo (JP), SimSun / 新宋体 (ZH).\n\n   Arial Narrow is now self-hosted from the user-uploaded\n   ARIALN.TTF (regular weight). Heavier weights fall back to\n   the Archivo Narrow webfont below / synthesized bold.\n   ============================================================ */\n\n/* vietnamese */\n@font-face {\n  font-family: 'Archivo Narrow';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"892cfdea-5a2f-443e-abbc-7490136aa20f\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Archivo Narrow';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"0184af63-fb1e-4337-bd6c-ff9be74bbc8c\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Archivo Narrow';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"d829c213-ab37-440b-afff-bc0febc42563\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Archivo Narrow';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"892cfdea-5a2f-443e-abbc-7490136aa20f\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Archivo Narrow';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"0184af63-fb1e-4337-bd6c-ff9be74bbc8c\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Archivo Narrow';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"d829c213-ab37-440b-afff-bc0febc42563\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Archivo Narrow';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"892cfdea-5a2f-443e-abbc-7490136aa20f\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Archivo Narrow';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"0184af63-fb1e-4337-bd6c-ff9be74bbc8c\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Archivo Narrow';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"d829c213-ab37-440b-afff-bc0febc42563\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Archivo Narrow';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"892cfdea-5a2f-443e-abbc-7490136aa20f\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Archivo Narrow';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"0184af63-fb1e-4337-bd6c-ff9be74bbc8c\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Archivo Narrow';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"d829c213-ab37-440b-afff-bc0febc42563\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n@font-face {\n  font-family: \"Arial Narrow\";\n  src: url(\"8256ad50-785a-42df-baac-cb9c3ac21461\") format('truetype');\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n\n/* メイリオ / Meiryo is the Japanese OS-level body font specified by\n   the style guide. It is licensed with the operating system and\n   cannot be shipped as a webfont, so these local()-only faces map\n   the family to the user's installed copy — no binary, no\n   substitution of a different family. */\n@font-face {\n  font-family: \"メイリオ\";\n  src: local(\"メイリオ\"), local(\"Meiryo\");\n  font-style: normal;\n}\n@font-face {\n  font-family: \"Meiryo\";\n  src: local(\"Meiryo\"), local(\"メイリオ\");\n  font-style: normal;\n}\n\n/* ============================================================\n   Renesas — Color tokens\n   Source of truth: Renesas Brand Book (ENG), May 2026.\n   Supersedes the 2020 PowerPoint Style Guide for color.\n   ------------------------------------------------------------\n   Corporate color is \"Renesas Blue\" = Pantone Reflex Blue C,\n   RGB 42/40/157 = #2A289D, used everywhere INCLUDING PowerPoint\n   (the Brand Book color is authoritative; the older on-screen\n   #06418C is no longer used). --renesas-blue-ppt is kept as an\n   alias for compatibility and now resolves to #2A289D too.\n   ============================================================ */\n\n:root {\n  /* ---- Brand core ------------------------------------------------ */\n  --renesas-blue:        #2A289D;  /* CORPORATE Renesas Blue (Reflex Blue C, RGB 42/40/157) */\n  --renesas-blue-ppt:    #2A289D;  /* PowerPoint blue — aligned to the corporate color per Brand Book (May 2026) */\n  --renesas-blue-link:   #2A289D;  /* hyperlinks / headline + body emphasis */\n  --renesas-ink:         #3C3C3B;  /* near-black, primary running text */\n  --renesas-grey:        #706F6F;  /* corporate Renesas Gray (CoolGray 7540 C, RGB 112/111/111) */\n  --renesas-white:       #FFFFFF;\n  --renesas-paper:       #F2F2F2;  /* light surface */\n\n  /* ---- Secondary palette (Brand Book p.44) ----------------------\n     Highlights for graphics, tables, charts and infographics.\n     All may also be used in paler gradation. */\n  --accent-indigo:       #615E8E;  /* RGB 97/94/142 */\n  --accent-teal:         #60A9B4;  /* RGB 96/169/180 */\n  --accent-blue:         #43ABE2;  /* RGB 67/171/226 — bright sky blue */\n  --accent-deepteal:     #306683;  /* RGB 48/102/131 */\n  --accent-slate:        #7C909B;  /* RGB 124/144/155 */\n  --accent-yellow:       #DFB118;  /* RGB 223/177/24 — gold */\n  --accent-orange:       #EB6209;  /* RGB 235/98/9 */\n  --accent-red:          #B71921;  /* RGB 183/25/33 */\n  --accent-purple:       #883D90;  /* RGB 136/61/144 */\n  --accent-green:        #609A3B;  /* RGB 96/154/59 */\n  --accent-olive:        #758859;  /* RGB 117/136/89 */\n  --accent-black:        #000000;\n\n  /* ---- Diagram / chart palette ----------------------------------\n     Brand secondary colors expressed in light / medium / dark\n     intensities for charts. Use medium as the base; tints for\n     fills, shades for emphasis/labels. */\n  /* light (tint) */\n  --chart-blue-light:    #B4DCF4;\n  --chart-teal-light:    #BDDDE2;\n  --chart-yellow-light:  #F1DD93;\n  --chart-green-light:   #BDD9A8;\n  --chart-red-light:     #E6A7AB;\n  --chart-purple-light:  #CBA6CF;\n  /* medium (base = brand secondary) */\n  --chart-blue:          #43ABE2;\n  --chart-teal:          #60A9B4;\n  --chart-yellow:        #DFB118;\n  --chart-green:         #609A3B;\n  --chart-red:           #B71921;\n  --chart-purple:        #883D90;\n  /* dark (shade) */\n  --chart-blue-dark:     #306683;\n  --chart-teal-dark:     #3C6A72;\n  --chart-yellow-dark:   #9C7B0F;\n  --chart-green-dark:    #436B29;\n  --chart-red-dark:      #7E1016;\n  --chart-purple-dark:   #5E2A64;\n\n  /* ---- Neutral ramp --------------------------------------------- */\n  --grey-900:            #3C3C3C;\n  --grey-700:            #706F6F;  /* corporate Renesas Gray */\n  --grey-500:            #9D9D9D;\n  --grey-300:            #B5B5B5;\n  --grey-200:            #D9D9D9;\n  --grey-100:            #F2F2F2;\n\n  /* ---- Semantic aliases ----------------------------------------- */\n  --text-primary:        var(--renesas-ink);\n  --text-secondary:      var(--grey-700);\n  --text-muted:          var(--grey-500);\n  --text-on-blue:        var(--renesas-white);\n  --text-link:           var(--renesas-blue-link);\n\n  --surface-page:        var(--renesas-white);\n  --surface-card:        var(--renesas-white);\n  --surface-subtle:      var(--renesas-paper);\n  --surface-grey:        var(--renesas-grey);\n  --surface-brand:       var(--renesas-blue);\n\n  --border-default:      var(--grey-200);\n  --border-strong:       var(--renesas-grey);\n  --border-brand:        var(--renesas-blue);\n  --border-accent:       var(--accent-blue);\n\n  --bullet-blue:         var(--renesas-blue);  /* L1/L2 square bullets */\n  --bullet-line:         var(--renesas-ink);   /* L4/L5 line bullets */\n\n  --status-error:        var(--accent-red);\n  --status-warning:      var(--accent-yellow);\n  --status-success:      var(--accent-green);\n  --status-info:         var(--renesas-blue);\n}\n\n/* ============================================================\n   Renesas — Typography tokens\n   Style guide: Arial (body) + Arial Narrow (titles/subheads).\n   Titles use CAPITAL letters. Sizes optimized for on-screen\n   slides — Title 32pt, Subtitle 20pt, Body 16pt (scalable to\n   20pt for large audiences).\n   ============================================================ */\n\n:root {\n  /* ---- Font families -------------------------------------------- */\n  --font-display: \"Arial Narrow\", \"Archivo Narrow\", Arial, \"Helvetica Neue\", Helvetica, sans-serif;\n  --font-body:    Arial, \"Helvetica Neue\", Helvetica, \"Liberation Sans\", \"メイリオ\", Meiryo, sans-serif;\n  --font-mono:    \"Consolas\", \"SFMono-Regular\", Menlo, Monaco, monospace;\n\n  /* ---- Weights -------------------------------------------------- */\n  --weight-regular: 400;\n  --weight-medium:  500;\n  --weight-bold:    700;\n\n  /* ---- Slide type scale (the source-of-truth pt sizes) ----------\n     1pt ≈ 1.333px. Expressed here in px for screen use. */\n  --size-slide-title:    43px;  /* 32pt */\n  --size-slide-subtitle: 27px;  /* 20pt */\n  --size-slide-body:     21px;  /* 16pt */\n  --size-slide-body-lg:  27px;  /* 20pt — large audience */\n\n  /* ---- UI / web type scale -------------------------------------- */\n  --size-display:  40px;\n  --size-h1:       32px;\n  --size-h2:       24px;\n  --size-h3:       20px;\n  --size-body-lg:  18px;\n  --size-body:     16px;\n  --size-body-sm:  14px;\n  --size-caption:  12px;\n\n  /* ---- Line heights --------------------------------------------- */\n  --leading-tight:   1.1;\n  --leading-heading: 1.2;\n  --leading-snug:    1.35;\n  --leading-body:    1.5;\n\n  /* ---- Letter spacing ------------------------------------------- */\n  --tracking-title:  0.01em;   /* slight, for ALL-CAPS titles */\n  --tracking-normal: 0;\n  --tracking-wide:   0.06em;   /* labels / eyebrows */\n}\n\n/* ============================================================\n   Renesas — Spacing, radii, borders, shadows, layout\n   The PowerPoint system is a flat, squared, grid-based design:\n   minimal rounding, thin rules, restrained shadows.\n   ============================================================ */\n\n:root {\n  /* ---- Spacing scale (4px base) --------------------------------- */\n  --space-0:   0;\n  --space-1:   4px;\n  --space-2:   8px;\n  --space-3:   12px;\n  --space-4:   16px;\n  --space-5:   24px;\n  --space-6:   32px;\n  --space-7:   48px;\n  --space-8:   64px;\n  --space-9:   96px;\n\n  /* ---- Radii — Renesas is squared; rounding is minimal ---------- */\n  --radius-none: 0;\n  --radius-sm:   2px;\n  --radius-md:   4px;\n  --radius-pill: 999px;\n\n  /* ---- Borders -------------------------------------------------- */\n  --border-hairline: 1px;\n  --border-rule:     2px;   /* heading underline / divider rules */\n  --border-accent:   4px;   /* left accent bars */\n\n  /* ---- Shadows — restrained, flat brand ------------------------- */\n  --shadow-none: none;\n  --shadow-card: 0 1px 3px rgba(60, 60, 59, 0.12);\n  --shadow-pop:  0 4px 16px rgba(60, 60, 59, 0.16);\n  --shadow-modal:0 12px 40px rgba(42, 40, 157, 0.20);\n\n  /* ---- Motion — style guide: Fade transitions, Fade/Wipe anims -- */\n  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */\n  --duration-fast: 120ms; /* @kind other */\n  --duration-base: 200ms; /* @kind other */\n  --duration-slow: 320ms; /* @kind other */\n\n  /* ---- Slide canvas -------------------------------------------- */\n  --slide-w: 1280px;\n  --slide-h: 720px;\n  --slide-margin: 56px;     /* outer safe margin / design grid */\n  --slide-rule: var(--renesas-blue);\n}\n\n<\u002Fstyle>\n<script src=\"9ea5b36d-49c0-4948-b0aa-ad62ebc5e665\"><\u002Fscript>\n<script src=\"26ae632b-b0d5-46fc-85eb-40d577871ec1\"><\u002Fscript>\n<style>\n  html, body { margin: 0; padding: 0; height: 100%; }\n  .jlink-app {\n    --app-bg:#ECECEC; --panel:#FFFFFF; --panel-2:#F6F6F7; --raise:#FFFFFF;\n    --ink:#3C3C3B; --ink-2:#706F6F; --ink-3:#A0A0A6; --line:#E4E4E6; --line-2:#D4D4D8;\n    --brand:#2A289D; --brand-soft:rgba(42,40,157,0.07); --brand-on:#FFFFFF;\n    --ok:#4B8A35; --ok-soft:rgba(96,154,59,0.13);\n    --warn:#9C7B0F; --warn-soft:rgba(223,177,24,0.16);\n    --danger:#B71921; --danger-soft:rgba(183,25,33,0.10);\n    --term-bg:#FBFBFC; --term-fg:#3C3C3B; --term-info:#2A289D; --term-error:#B71921;\n    --term-warn:#9C7B0F; --term-exit:#9D9D9D; --term-prompt:#4B8A35; --term-line:#ECECEE;\n    --renesas-blue:#2A289D; --shadow:0 1px 3px rgba(60,60,59,0.10); --shadow-pop:0 8px 30px rgba(42,40,157,0.16);\n  }\n  .jlink-app[data-theme=\"dark\"] {\n    --app-bg:#101015; --panel:#1A1A21; --panel-2:#21212B; --raise:#23232E;\n    --ink:#E8E8EE; --ink-2:#A7A7B4; --ink-3:#6C6C78; --line:#2A2A34; --line-2:#383844;\n    --brand:#7D7BF2; --brand-soft:rgba(125,123,242,0.13); --brand-on:#0E0E13;\n    --ok:#7BD08B; --ok-soft:rgba(96,154,59,0.18);\n    --warn:#E6B450; --warn-soft:rgba(223,177,24,0.15);\n    --danger:#FF8585; --danger-soft:rgba(183,25,33,0.20);\n    --term-bg:#0C0C11; --term-fg:#D6D6DD; --term-info:#9C9AFF; --term-error:#FF8585;\n    --term-warn:#E6B450; --term-exit:#76767F; --term-prompt:#7BD08B; --term-line:#1C1C26;\n    --renesas-blue:#7D7BF2; --shadow:0 1px 3px rgba(0,0,0,0.4); --shadow-pop:0 10px 36px rgba(0,0,0,0.55);\n  }\n  .jlink-app .wm-dark { display:none; }\n  .jlink-app[data-theme=\"dark\"] .wm-light { display:none; }\n  .jlink-app[data-theme=\"dark\"] .wm-dark { display:block; }\n\n  .jlink-app ::-webkit-scrollbar { width:10px; height:10px; }\n  .jlink-app ::-webkit-scrollbar-thumb { background:var(--line-2); border-radius:2px; }\n  .jlink-app ::-webkit-scrollbar-track { background:transparent; }\n\n  @keyframes calmPulse { 0%{ transform:scale(1); opacity:.45 } 100%{ transform:scale(2.0); opacity:0 } }\n  @keyframes calmSpin  { to { transform:rotate(360deg) } }\n  @keyframes miniSpin  { to { transform:rotate(360deg) } }\n  @keyframes popIn     { from{ opacity:0; transform:translateY(8px) } to{ opacity:1; transform:none } }\n  @keyframes fadeIn    { from{ opacity:0 } to{ opacity:1 } }\n\n  .scan-wrap .scan-ring, .scan-wrap .scan-arc { opacity:0; }\n  .scan-wrap.is-scanning .scan-ring { animation:calmPulse 3s ease-out infinite; }\n  .scan-wrap.is-scanning .scan-ring.r2 { animation-delay:1.5s; }\n  .scan-wrap.is-scanning .scan-arc  { opacity:1; animation:calmSpin 2.2s linear infinite; }\n\n  .hero { transition: transform .55s cubic-bezier(0.4,0,0.2,1), opacity .4s ease; }\n  .hero.hero-hidden { transform: translateX(-112%); opacity:0; pointer-events:none; }\n\n  @keyframes brandGlow {\n    0%,100% { box-shadow: 0 0 0 1px color-mix(in srgb, var(--brand) 26%, transparent), 0 6px 34px color-mix(in srgb, var(--brand) 22%, transparent), var(--shadow); }\n    50%     { box-shadow: 0 0 0 1px color-mix(in srgb, var(--brand) 46%, transparent), 0 10px 54px color-mix(in srgb, var(--brand) 42%, transparent), var(--shadow); }\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div class=\"jlink-app\" data-theme=\"{{ theme }}\" style=\"height:100vh; display:flex; flex-direction:column; background:var(--app-bg); color:var(--ink); font-family:var(--font-body); overflow:hidden; position:relative;\">\n\n  <!-- ============ HEADER ============ -->\n  <header style=\"flex-shrink:0; height:60px; display:flex; align-items:center; gap:18px; padding:0 22px; background:var(--panel); border-bottom:1px solid var(--line);\">\n    <img class=\"wm-light\" src=\"85521b7a-a1da-49d0-b3c7-023afcf59933\" alt=\"Renesas\" style=\"height:24px; width:auto; display:block;\">\n    <img class=\"wm-dark\" src=\"8247c258-52a5-49ec-920f-4634dbeaeb68\" alt=\"Renesas\" style=\"height:24px; width:auto; display:none;\">\n    <div style=\"width:1px; height:30px; background:var(--line-2);\"><\u002Fdiv>\n    <div style=\"display:flex; flex-direction:column; gap:2px; line-height:1;\">\n      <span style=\"font-family:var(--font-display); font-size:18px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; color:var(--ink);\">J-Link Web Interface<\u002Fspan>\n      <span style=\"font-size:11px; letter-spacing:0.05em; color:var(--ink-3); text-transform:uppercase;\">SEGGER J-Link · Target Control<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"flex:1;\"><\u002Fdiv>\n\n    <div style=\"display:flex; align-items:center; gap:8px; padding:6px 11px; border-radius:2px; background:var(--ok-soft); border:1px solid color-mix(in srgb, var(--ok) 35%, transparent);\">\n      <span style=\"width:7px; height:7px; border-radius:50%; background:var(--ok);\"><\u002Fspan>\n      <span style=\"font-size:12px; font-weight:700; color:var(--ok); letter-spacing:0.02em;\">J-Link OB-S124<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex; align-items:center; gap:8px; padding:6px 11px; border-radius:2px; background:{{ sessionPillBg }}; border:1px solid {{ sessionPillBorder }};\">\n      <span style=\"width:7px; height:7px; border-radius:50%; background:{{ sessionPillDot }};\"><\u002Fspan>\n      <span style=\"font-size:12px; font-weight:700; color:{{ sessionPillFg }}; letter-spacing:0.02em;\">{{ sessionLabel }}<\u002Fspan>\n    <\u002Fdiv>\n\n    <button onclick=\"{{ toggleTheme }}\" title=\"Toggle light / dark\" style=\"display:inline-flex; align-items:center; justify-content:center; width:38px; height:38px; border:1px solid var(--line-2); background:var(--panel-2); border-radius:2px; cursor:pointer; color:var(--ink-2);\" style-hover=\"border-color:var(--brand); color:var(--brand);\">\n      <jl-icon name=\"{{ themeIcon }}\" size=\"18\" color=\"currentColor\"><\u002Fjl-icon>\n 2); margin-bottom:6px;\">Interface<\u002Flabel>\n        <select value=\"{{ iface }}\" onchange=\"{{ onIface }}\" style=\"width:100%; box-sizing:border-box; background:var(--panel-2); border:1px solid var(--line-2); color:var(--ink); padding:9px 11px; border-radius:2px; font-family:var(--font-body); font-size:13px; outline:none; margin-bottom:12px; cursor:pointer;\" style-focus=\"border-color:var(--brand);\">\n          <sc-for list=\"{{ ifaces }}\" as=\"opt\" hint-placeholder-count=\"5\">\n            <option value=\"{{ opt }}\">{{ opt }}<\u002Foption>\n          <\u002Fsc-for>\n        <\u002Fselect>\n\n        <label style=\"display:block; font-size:12px; font-weight:700; color:var(--ink-2); margin-bottom:6px;\">Speed (kHz)<\u002Flabel>\n        <input value=\"{{ speed }}\" oninput=\"{{ onSpeed }}\" type=\"number\" style=\"width:100%; box-sizing:border-box; background:var(--panel-2); border:1px solid var(--line-2); color:var(--ink); padding:9px 11px; border-radius:2px; font-family:var(--font-mono); font-size:13px; outline:none; margin-bottom:16px;\" style-focus=\"border-color:var(--brand); box-shadow:0 0 0 2px var(--brand-soft);\">\n\n        <div style=\"display:flex; gap:8px;\">\n          <button onclick=\"{{ startSession }}\" disabled=\"{{ sessionActive }}\" style=\"flex:1; display:inline-flex; align-items:center; justify-content:center; gap:7px; padding:10px; background:var(--brand); color:var(--brand-on); border:1px solid var(--brand); border-radius:2px; font-family:var(--font-body); font-size:13px; font-weight:700; cursor:pointer; opacity:{{ startOpacity }};\">\n            <jl-icon name=\"play\" size=\"14\" color=\"var(--brand-on)\"><\u002Fjl-icon>\n            Start\n          <\u002Fbutton>\n          <button onclick=\"{{ stopSession }}\" disabled=\"{{ stopDisabled }}\" style=\"flex:1; display:inline-flex; align-items:center; justify-content:center; gap:7px; padding:10px; background:transparent; color:var(--danger); border:1px solid var(--danger); borde Fdiv>\n                <sc-if value=\"{{ projectsOpen }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div>\n                    <div style=\"padding:12px 16px; border-bottom:1px solid var(--line);\">\n                      <div style=\"display:flex; align-items:center; gap:9px; background:var(--panel-2); border:1px solid var(--line-2); border-radius:2px; padding:0 12px;\">\n                        <jl-icon name=\"search\" size=\"15\" color=\"var(--ink-3)\"><\u002Fjl-icon>\n                        <input value=\"{{ search }}\" oninput=\"{{ onSearch }}\" placeholder=\"Search example projects…\" style=\"flex:1; background:transparent; border:none; color:var(--ink); font-family:var(--font-body); font-size:13px; padding:9px 0; outline:none;\">\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:8px; padding:14px 16px;\">\n                      <sc-for list=\"{{ projects }}\" as=\"p\" hint-placeholder-count=\"12\">\n                        <div title=\"{{ p.cat }}\" style=\"display:flex; flex-direction:column; background:var(--panel-2); border:1px solid var(--line); border-radius:2px; overflow:hidden;\" style-hover=\"border-color:var(--brand);\">\n                          <div style=\"flex:1; padding:11px 10px; text-align:center; font-size:12px; font-weight:600; color:var(--ink); line-height:1.35; word-break:break-word;\">{{ p.name }}<\u002Fdiv>\n                          <button onclick=\"{{ p.openE2 }}\" style=\"padding:6px 0; background:var(--brand-soft); border:none; border-top:1px solid var(--line); color:var(--brand); font-family:var(--font-body); font-size:11px; font-weight:700; cursor:pointer; letter-spacing:0.02em;\">Open in e2 studio<\u002Fbutton>\n                        <\u002Fdiv>\n                      <\u002Fsc-for>\n                      <sc-if value=\"{{ noProjects }}\" hint-placeholder-val=\"{{ false }}\">\n                        <div sor:pointer;\" style-hover=\"border-color:var(--brand); color:var(--brand);\">Cancel<\u002Fbutton>\n        <\u002Fdiv>\n        <sc-if value=\"{{ e2Status }}\" hint-placeholder-val=\"\">\n          <div style=\"margin-top:12px; font-size:13px; color:var(--ok); display:flex; align-items:center; gap:7px;\">\n            <jl-icon name=\"circle-check\" size=\"15\" color=\"var(--ok)\"><\u002Fjl-icon>\n            {{ e2Status }}\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;},&quot;defaultTheme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;default&quot;:&quot;light&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Appearance&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    theme: \"light\",\n    mode: \"hero\",\n    scanning: false,\n    overlayOpen: false,\n    overlayMode: \"result\",\n    sessionActive: false,\n    sessionOpen: false,\n    heroMounted: true,\n    cmdsOpen: false,\n    projectsOpen: false,\n    e2Open: false,\n    e2Project: \"\",\n    e2Path: \"\",\n    e2Status: \"\",\n    search: \"\",\n    device: \"\",\n    iface: \"SWD\",\n    speed: \"4000\",\n    script: \"\",\n    cmd: \"\",\n    lines: [],\n  };\n\n  IFACES = [\"SWD\", \"JTAG\", \"cJTAG\", \"FINE\", \"SPI\"];\n\n  COMMANDS = [\n    { label: \"Connect\", cmd: \"connect\" },\n    { label: \"Reset\", cmd: \"r\" },\n    { label: \"Halt\", cmd: \"halt\" },\n    { label: \"Run (Go)\", cmd: \"go\" },\n    { label: \"Erase Flash\", cmd: \"erase\" },\n    { label: \"Show Registers\", cmd: \"regs\" },\n    { label: \"Read CPUID\", cmd: \"mem32 0xE000ED00 1\" },\n    { label: \"Mem Dump @ 0x0\", cmd: \"mem 0x00000000 64\" },\n  ];\n\n  DEVICE_INFO = [\n    { k: \"Core\", v: \"Cortex-M33\" },\n    { k: \"Architecture\", v: \"ARMv8-M\" },\n    { k: \"Endianness\", v: \"Little\" },\n    { k: \"FPU\", v: \"Present\" },\n    { k: \"Flash\", v: \"1024 kB\" },\n    { k: \"RAM\", v: \"256 kB\" },\n    { k: \"Security\", v: \"TrustZone\" },\n    { k: \"Debug Port\", v: \"SW-DPv2\" },\n  ];\n\n  CAT = {\n    adc: \"Analog-to-Digital Converter\", ble: \"Bluetooth Low Energy\", can: \"CAN FD Bus\",\n    dac: \"Digital-to-Analog Converter\", ethernet: \"Ethernet / lwIP\", freertos: \"FreeRTOS\",\n    gpt: \"General Purpose Timer\", i2c: \"I2C Communication\", lpm: \"Low Power Mode\",\n    qspi: \"QSPI Flash\", rtc: \"Real-Time Clock\", sci: \"Serial Communication Interface\",\n    sdhi: \"SD Card / FileX\", spi: \"SPI Communication\", trustzone: \"TrustZone Security\",\n    usb: \"USB CDC Console\",\n  };\n\n  PROJECT_NAMES = [\n    \"adc_baremetal\", \"ble_central\", \"can_fd_loopback\", \"dac_sine\",\n    \"ethernet_lwip\", \"freertos_blinky\", \"gpt_pwm\", \"i2c_eeprom\",\n    \"lpm_lowpower\", \"qspi_flashloader\", \"rtc_calendar\", \"sci_uart_echo\",\n    \"sdhi_filex\", \"spi_oled\", \"trustzone_secure\", \"usb_cdc_console\",\n  ];\n\n  componentDidMount() {\n    let t = this.props.defaultTheme || \"light\";\n    try { const s = localStorage.getItem(\"jlink_theme\"); if (s === \"light\" || s === \"dark\") t = s; } catch (e) {}\n    this.setState({ theme: t, lines: this.seed() });\n  }\n\n  seed() {\n    const I = \"var(--term-info)\", X = \"var(--term-exit)\", F = \"var(--term-fg)\";\n    return [\n      { t: \"SEGGER J-Link Commander V7.94  (Compiled May 14 2026)\\n\", c: I },\n      { t: \"DLL version V7.94, compiled May 14 2026\\n\", c: X },\n      { t: \"Connecting to J-Link via USB...O.K.\\n\", c: F },\n      { t: \"Firmware: J-Link OB-S124 compiled Apr 02 2026\\n\", c: X },\n      { t: \"Hardware version: V1.00\\n\", c: X },\n      { t: \"S/N: 831006543\\n\", c: X },\n      { t: \"\\nReady. Press SCAN to auto-identify a target, or Start a session.\\n\", c: I },\n    ];\n  }\n\n  push(t, c) {\n    this.setState((s) => ({ lines: [...s.lines, { t, c: c || \"var(--term-fg)\" }] }));\n  }\n\n  toggleTheme = () => {\n    const t = this.state.theme === \"dark\" ? \"light\" : \"dark\";\n    this.setState({ theme: t });\n    try { localStorage.setItem(\"jlink_theme\", t); } catch (e) {}\n  };\n\n  onDevice = (e) => this.setState({ device: e.target.value });\n  onIface = (e) => this.setState({ iface: e.target.value });\n  onSpeed = (e) => this.setState({ speed: e.target.value });\n  onScript = (e) => this.setState({ script: e.target.value });\n  onSearch = (e) => this.setState({ search: e.target.value });\n  onCmd = (e) => this.setState({ cmd: e.target.value });\n  onE2Path = (e) => this.setState({ e2Path: e.target.value });\n\n  startScan = () => {\n    if (this.state.scanning) return;\n    const hero = this.state.mode === \"hero\";\n    // In hero mode the big button shows its own scan animation; the overlay opens once found.\n    this.setState({ scanning: true, overlayOpen: !hero, overlayMode: \"result\" });\n    this.push(\"\\nJ-Link> auto-identify\\n\", \"var(--term-info)\");\n    this.push(\"Searching SWD... \", \"var(--term-fg)\");\n    clearTimeout(this._scanT);\n    this._scanT = setTimeout(() => {\n      this.push(\"target found.\\n\", \"var(--term-prompt)\");\n      this.push(\"Found Cortex-M33 r0p4, Renesas R7FA6M4AF (EK-RA6M4).\\n\", \"var(--term-fg)\");\n      this.setState({ scanning: false, overlayOpen: true, overlayMode: \"result\" });\n      this.dismissHero();\n    }, 2200);\n  };\n\n  listProbes = () => {\n    this.setState({ overlayOpen: true, overlayMode: \"probes\", scanning: false });\n    this.dismissHero();\n  };\n\n  dismissHero = () => {\n    if (this.state.mode === \"app\") return;\n    this.setState({ mode: \"app\" });\n    clearTimeout(this._heroT);\n    this._heroT = setTimeout(() => this.setState({ heroMounted: false }), 650);\n  };\n  skipHero = () => this.dismissHero();\n  toggleSession = () => this.setState((s) => ({ sessionOpen: !s.sessionOpen }));\n\n  closeOverlay = () => this.setState({ overlayOpen: false });\n\n  toggleCmds = () => this.setState((s) => ({ cmdsOpen: !s.cmdsOpen }));\n  toggleProjects = () => this.setState((s) => ({ projectsOpen: !s.projectsOpen }));\n\n  startSession = () => {\n    if (this.state.sessionActive) return;\n    const d = this.state.device.trim() || \"(auto)\";\n    this.setState({ sessionActive: true });\n    this.push(\"\\n-- Session started -- Device: \" + d + \", IF: \" + this.state.iface + \", \" + this.state.speed + \" kHz\\n\", \"var(--term-info)\");\n    this.push(\"Connecting to target via \" + this.state.iface + \"...O.K.\\n\", \"var(--term-fg)\");\n  };\n\n  stopSession = () => {\n    if (!this.state.sessionActive) return;\n    this.setState({ sessionActive: false });\n    this.push(\"-- Session stopped --\\n\", \"var(--term-exit)\");\n  };\n\n  applyResult = () => {\n    this.setState({ device: \"R7FA6M4AF\", iface: \"SWD\", overlayOpen: false });\n    setTimeout(() => this.startSession(), 60);\n  };\n\n  runCmd = (cmd) => {\n    if (!this.state.sessionActive) {\n      this.push(\"\\n[Start a session first]\\n\", \"var(--term-error)\");\n      return;\n    }\n    this.push(\"J-Link> \" + cmd + \"\\n\", \"var(--term-fg)\");\n  };\n\n  runScript = () => {\n    const s = this.state.script.trim();\n    if (!s) return;\n    this.push(\"\\n-- Running script --\\n\", \"var(--term-info)\");\n    s.split(\"\\n\").forEach((l) => l.trim() && this.push(\"J-Link> \" + l.trim() + \"\\n\", \"var(--term-fg)\"));\n    this.push(\"-- Script exited (code 0) --\\n\", \"var(--term-exit)\");\n  };\n\n  sendCmd = () => {\n    const c = this.state.cmd.trim();\n    if (!c) return;\n    this.runCmd(c);\n    this.setState({ cmd: \"\" });\n  };\n\n  onCmdKey = (e) => { if (e.key === \"Enter\") this.sendCmd(); };\n\n  clearTerminal = () => this.setState({ lines: [] });\n\n  openE2 = (name) => {\n    let base = \"C:\\\\workspace\";\n    try { const b = localStorage.getItem(\"e2studio_base_path\"); if (b) base = b; } catch (e) {}\n    this.setState({ e2Open: true, e2Project: name, e2Path: base + \"\\\\\" + name, e2Status: \"\" });\n  };\n  closeE2 = () => this.setState({ e2Open: false });\n  closeE2Backdrop = () => this.setState({ e2Open: false });\n  stop = (e) => { e.stopPropagation(); };\n  launchE2 = () => {\n    const p = this.state.e2Path.trim();\n    const ls = Math.max(p.lastIndexOf(\"\\\\\"), p.lastIndexOf(\"/\"));\n    if (ls > 0) { try { localStorage.setItem(\"e2studio_base_path\", p.slice(0, ls)); } catch (e) {} }\n    this.setState({ e2Status: \"e2 studio launched\" });\n    setTimeout(() => this.setState({ e2Open: false }), 1200);\n  };\n\n  projectLabel(name) {\n    return name.split(\"_\").map((w) => w.charAt(0).toUpperCase() + w.slice(1)).join(\" \");\n  }\n\n  renderVals() {\n    const s = this.state;\n    const dark = s.theme === \"dark\";\n    const q = s.search.trim().toLowerCase();\n\n    const projects = this.PROJECT_NAMES\n      .filter((n) => !q || n.toLowerCase().includes(q))\n      .map((n) => ({\n        name: this.projectLabel(n),\n        cat: this.CAT[n.split(\"_\")[0]] || \"FSP Example Project\",\n        openE2: () => this.openE2(this.projectLabel(n)),\n      }));\n\n    const commands = this.COMMANDS.map((c) => ({ label: c.label, run: () => this.runCmd(c.cmd) }));\n\n    return {\n      theme: s.theme,\n      themeIcon: dark ? \"sun\" : \"moon\",\n      scanClass: s.scanning ? \"is-scanning\" : \"\",\n      scanLabel: s.scanning ? \"SCANNING\" : \"SCAN\",\n      heroClass: s.mode === \"app\" ? \"hero-hidden\" : \"\",\n      heroMounted: s.heroMounted,\n      skipHero: this.skipHero,\n      toggleSession: this.toggleSession,\n      sessionOpen: s.sessionOpen,\n      sessionChevron: s.sessionOpen ? \"rotate(0deg)\" : \"rotate(-90deg)\",\n\n      // header session pill\n      sessionLabel: s.sessionActive ? \"Session Active\" : \"Idle\",\n      sessionPillBg: s.sessionActive ? \"var(--ok-soft)\" : \"var(--panel-2)\",\n      sessionPillBorder: s.sessionActive ? \"color-mix(in srgb, var(--ok) 35%, transparent)\" : \"var(--line-2)\",\n      sessionPillDot: s.sessionActive ? \"var(--ok)\" : \"var(--ink-3)\",\n      sessionPillFg: s.sessionActive ? \"var(--ok)\" : \"var(--ink-2)\",\n\n      lines: s.lines,\n      device: s.device, iface: s.iface, speed: s.speed, ifaces: this.IFACES,\n      script: s.script, cmd: s.cmd,\n      onDevice: this.onDevice, onIface: this.onIface, onSpeed: this.onSpeed,\n      onScript: this.onScript, onSearch: this.onSearch, onCmd: this.onCmd, onCmdKey: this.onCmdKey,\n      search: s.search,\n\n      toggleTheme: this.toggleTheme,\n      startScan: this.startScan,\n      listProbes: this.listProbes,\n      startSession: this.startSession,\n      stopSession: this.stopSession,\n      runScript: this.runScript,\n      sendCmd: this.sendCmd,\n      clearTerminal: this.clearTerminal,\n      toggleCmds: this.toggleCmds,\n      toggleProjects: this.toggleProjects,\n      applyResult: this.applyResult,\n      closeOverlay: this.closeOverlay,\n      launchE2: this.launchE2, closeE2: this.closeE2, closeE2Backdrop: this.closeE2Backdrop,\n      stop: this.stop, onE2Path: this.onE2Path,\n\n      sessionActive: s.sessionActive,\n      startOpacity: s.sessionActive ? 0.4 : 1,\n      stopDisabled: !s.sessionActive,\n      stopOpacity: s.sessionActive ? 1 : 0.4,\n      cmdDisabled: !s.sessionActive,\n      sendOpacity: s.sessionActive ? 1 : 0.4,\n      cmdPlaceholder: s.sessionActive ? \"Type J-Link command and press Enter...\" : \"Start a session to enter commands...\",\n\n      cmdsOpen: s.cmdsOpen,\n      cmdsChevron: s.cmdsOpen ? \"rotate(0deg)\" : \"rotate(-90deg)\",\n      commands,\n\n      projectsOpen: s.projectsOpen,\n      projectsChevron: s.projectsOpen ? \"rotate(0deg)\" : \"rotate(-90deg)\",\n      projects,\n      noProjects: projects.length === 0,\n      projectCountLabel: \"(\" + projects.length + (q ? \" matched\" : \"\") + \")\",\n\n      overlayOpen: s.overlayOpen,\n      scanning: s.scanning,\n      showResult: s.overlayOpen && !s.scanning && s.overlayMode === \"result\",\n      showProbes: s.overlayOpen && s.overlayMode === \"probes\",\n      overlayTitle: s.scanning ? \"Identifying Target\" : (s.overlayMode === \"probes\" ? \"Connected J-Link Probes\" : \"Target Identified\"),\n      overlayIcon: s.overlayMode === \"probes\" ? \"usb\" : \"radar\",\n      deviceInfo: this.DEVICE_INFO,\n\n      sessionInfo: s.sessionActive\n        ? \"Session active \\u2014 \" + (s.device.trim() || \"(auto)\") + \" \\u00b7 \" + s.iface + \" \\u00b7 \" + s.speed + \" kHz\"\n        : \"No active session\",\n\n      e2Open: s.e2Open, e2Project: s.e2Project, e2Path: s.e2Path, e2Status: s.e2Status,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
